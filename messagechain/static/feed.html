<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MessageChain — live feed</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #ffffff;
    --fg: #111;
    --muted: #666;
    --card: #f5f5f5;
    --border: #ddd;
    --accent: #0a5;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0e0e10;
      --fg: #eee;
      --muted: #888;
      --card: #1a1a1d;
      --border: #2a2a2e;
      --accent: #6c9;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--fg);
    line-height: 1.45;
  }
  header {
    padding: 1.2rem 1.2rem 0.6rem;
    border-bottom: 1px solid var(--border);
  }
  header h1 {
    margin: 0 0 0.25rem;
    font-size: 1.35rem;
    letter-spacing: -0.01em;
  }
  header .sub {
    margin: 0;
    color: var(--muted);
    font-size: 0.9rem;
  }
  header .sub a { color: var(--accent); }
  main {
    max-width: 720px;
    margin: 0 auto;
    padding: 1rem 1rem 4rem;
  }
  .status {
    font-size: 0.85rem;
    color: var(--muted);
    margin: 0.75rem 0;
  }
  .msg {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.75rem 0.9rem;
    margin: 0.6rem 0;
  }
  .msg .meta {
    font-size: 0.75rem;
    color: var(--muted);
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    display: flex;
    justify-content: space-between;
    gap: 0.5rem;
    flex-wrap: wrap;
    margin-bottom: 0.3rem;
  }
  .msg .meta .entity {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    max-width: 60%;
  }
  .msg .text {
    white-space: pre-wrap;
    word-wrap: break-word;
    font-size: 0.95rem;
  }
  .msg.empty {
    text-align: center;
    color: var(--muted);
    font-style: italic;
  }
  footer {
    max-width: 720px;
    margin: 0 auto;
    padding: 1rem;
    font-size: 0.8rem;
    color: var(--muted);
    text-align: center;
  }
  footer a { color: var(--accent); }
</style>
</head>
<body>
<header>
  <h1>MessageChain — live feed</h1>
  <p class="sub">
    Messages that cannot be deleted.
    <a href="https://github.com/ben-arnao/MessageChain">source</a>
  </p>
</header>
<main>
  <p class="status" id="status">Loading…</p>
  <div id="feed"></div>
</main>
<footer>
  Auto-refreshes every 15 seconds. Newest first.
</footer>
<script>
(function () {
  "use strict";
  const POLL_MS = 15000;
  const LIMIT = 30;
  const statusEl = document.getElementById("status");
  const feedEl = document.getElementById("feed");
  let seenHashes = new Set();

  function shortHex(hex, head, tail) {
    if (!hex || hex.length <= head + tail + 1) return hex || "";
    return hex.slice(0, head) + "…" + hex.slice(-tail);
  }

  function formatTs(sec) {
    if (typeof sec !== "number") return "";
    const d = new Date(sec * 1000);
    if (isNaN(d.getTime())) return "";
    return d.toISOString().replace("T", " ").slice(0, 19) + " UTC";
  }

  function renderMessage(m) {
    const card = document.createElement("div");
    card.className = "msg";
    const meta = document.createElement("div");
    meta.className = "meta";
    const entity = document.createElement("span");
    entity.className = "entity";
    entity.textContent = "from " + shortHex(m.entity_id, 10, 6);
    const right = document.createElement("span");
    right.textContent = "block " + m.block_number + " · " + formatTs(m.timestamp);
    meta.appendChild(entity);
    meta.appendChild(right);
    const text = document.createElement("div");
    text.className = "text";
    text.textContent = m.message;
    card.appendChild(meta);
    card.appendChild(text);
    return card;
  }

  function render(messages, height) {
    feedEl.replaceChildren();
    if (!messages || !messages.length) {
      const empty = document.createElement("div");
      empty.className = "msg empty";
      empty.textContent = "No messages on-chain yet. Be the first.";
      feedEl.appendChild(empty);
      return;
    }
    for (const m of messages) {
      feedEl.appendChild(renderMessage(m));
    }
    statusEl.textContent = "Chain height " + height + " · showing " + messages.length + " newest";
  }

  async function poll() {
    try {
      const r = await fetch("/v1/latest?limit=" + LIMIT, { cache: "no-store" });
      if (!r.ok) throw new Error("HTTP " + r.status);
      const data = await r.json();
      if (!data.ok) throw new Error(data.error || "unknown error");
      render(data.messages, data.height);
    } catch (e) {
      statusEl.textContent = "Feed unreachable (" + e.message + "). Retrying…";
    }
  }

  poll();
  setInterval(poll, POLL_MS);
})();
</script>
</body>
</html>
