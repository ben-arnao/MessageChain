[Journal]
# Cap disk usage so a runaway log spew never fills the root partition.
# Validator logs run steady-state at ~kB/block; 500M is ~6 months of
# normal activity with headroom for the occasional debug burst.
SystemMaxUse=500M
SystemKeepFree=1G
SystemMaxFileSize=50M
MaxRetentionSec=1month
MaxFileSec=1week
ForwardToSyslog=no
